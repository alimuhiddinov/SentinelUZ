version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sentineluz
      POSTGRES_USER: sentineluz
      POSTGRES_PASSWORD: sentineluz_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentineluz"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build: ./edr_server
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./edr_server:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sentineluz:sentineluz_pass@postgres:5432/sentineluz
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY}
      - NVD_API_KEY=${NVD_API_KEY}
      - ABUSE_CH_API_KEY=${ABUSE_CH_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
